<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neko Bot Shop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1b1b24;
            color: #fff;
            padding: 8px;
            min-height: 100vh;
        }
        .box {
            background: linear-gradient(180deg, #2f2f46 0%, #242438 100%);
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.25);
        }
        h1 {
            font-size: 20px;
            margin-bottom: 4px;
        }
        .sub {
            font-size: 12px;
            color: #c9c9da;
            margin-bottom: 10px;
        }
        .meta {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            align-items: center;
            font-size: 11px;
            color: #c9c9da;
            margin-bottom: 10px;
        }
        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .user-input {
            flex: 1;
            min-width: 140px;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #4b4b66;
            background: #171724;
            color: #fff;
        }
        .pill {
            padding: 4px 8px;
            border-radius: 999px;
            background: #3a3a52;
            color: #f3f4f6;
            font-size: 11px;
        }
        .pill.online {
            background: #164e2d;
            color: #86efac;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }
        .card {
            background: #1f1f2d;
            border-radius: 10px;
            padding: 10px;
        }
        .label {
            font-size: 11px;
            color: #b8b8cb;
        }
        .stat {
            font-size: 26px;
            font-weight: bold;
            color: #ffd54a;
            margin-top: 4px;
        }
        .muted {
            font-size: 11px;
            color: #b8b8cb;
        }
        .section {
            margin-top: 12px;
        }
        .section h2 {
            font-size: 14px;
            margin-bottom: 8px;
            color: #f7d66a;
        }
        .list {
            display: grid;
            gap: 8px;
        }
        .item {
            background: #1f1f2d;
            border-radius: 8px;
            padding: 8px 10px;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .item-title {
            font-size: 13px;
            font-weight: 600;
        }
        .price {
            font-size: 12px;
            color: #f472b6;
            font-weight: bold;
            white-space: nowrap;
        }
        .chip-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }
        .chip {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 999px;
            background: #442c78;
            color: #fff;
            font-size: 11px;
        }
        .buy-btn {
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 11px;
            cursor: pointer;
            margin-top: 6px;
        }
        .buy-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }
        .ghost-btn {
            background: #242438;
            color: #fff;
            border: 1px solid #4b4b66;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 11px;
            cursor: pointer;
        }
        .error {
            color: #ff8f8f;
            font-size: 11px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🐱 Neko Bot</h1>
        <div class="sub">Dein Gold, Inventar und Shop</div>

        <div class="meta">
            <span>Benutzer: <span id="username">?</span></span>
            <span id="signal" class="pill">⏳ Laden...</span>
        </div>

        <div class="toolbar">
            <input id="userInput" class="user-input" type="text" placeholder="Twitch-Name eingeben" />
            <button class="ghost-btn" onclick="applyUserFromInput()">Laden</button>
            <button class="ghost-btn" onclick="copyShopLink()">Link kopieren</button>
        </div>

        <div class="stats">
            <div class="card">
                <div class="label">💰 Gold</div>
                <div class="stat" id="gold">0</div>
            </div>
            <div class="card">
                <div class="label">🎣 Fische</div>
                <div class="stat" id="fishCount">0</div>
            </div>
        </div>

        <div class="card">
            <div class="label">✨ Freigeschaltete Items</div>
            <div id="ownedItems" class="chip-wrap">
                <span class="muted">Noch keine Items gekauft</span>
            </div>
        </div>

        <div class="section">
            <h2>🎒 Inventar</h2>
            <div id="inventory" class="list">
                <div class="item"><div class="muted">Lade Inventar...</div></div>
            </div>
        </div>

        <div class="section">
            <h2>🛒 Shop</h2>
            <div id="shop" class="list"></div>
        </div>

        <div id="error" class="error"></div>
    </div>

    <script src="panel.js"></script>
</body>
</html>
